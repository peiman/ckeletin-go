# Conformance mapping: maps automated checks to CKSPEC requirement IDs.
# Used by `task conform` to generate the conformance report.
# Format agreed between ckeletin-go and ckeletin-rust architects.
#
# This file MUST be valid YAML — `conform.sh` parses it with `yq` and fails the
# build (and the release gate) if it does not parse. A `checks:` entry is a shell
# command. When a command contains regex backslashes or other YAML-special
# characters, write it as a literal block scalar so it is taken verbatim — no
# escaping:
#     checks:
#       - |-
#         grep -qE 'foo\.bar' some/file
# Simple commands with no special characters may stay as plain double-quoted
# one-liners (e.g. "task validate:layering").

spec_version: "0.10.0"

requirements:
  # ═══════════════════════════════════════════════════════════════
  # Architecture (CKSPEC-ARCH-001 through CKSPEC-ARCH-007)
  # ═══════════════════════════════════════════════════════════════

  CKSPEC-ARCH-001:
    title: "Four-layer architecture"
    status: met
    enforcement_level: linter
    evidence: >
      .go-arch-lint.yml defines four layers: commands (cmd/), business
      (internal/ping, docs, dev, progress, check), infrastructure
      (.ckeletin/pkg/*, internal/config/commands, internal/ui, internal/xdg).
      Entry layer is main.go (wiring only; size capped by the ARCH-006
      check). task validate:layering passes.
    checks:
      - "task validate:layering"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ARCH001_FileOutsideComponent"

  CKSPEC-ARCH-002:
    title: "Directed dependencies"
    status: met
    enforcement_level: linter
    evidence: >
      go-arch-lint enforces directed dependencies. Business mayDependOn
      infrastructure only. Infrastructure mayDependOn nothing.
    checks:
      - "task validate:layering"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ARCH002_ReverseDepBusinessImportsCmd"

  CKSPEC-ARCH-003:
    title: "CLI framework isolation"
    status: met
    enforcement_level: linter
    evidence: >
      depOnAnyVendor:false enables vendor import checking. canUse rules
      restrict Cobra and pflag to commands layer only. Business and
      infrastructure cannot import them.
    checks:
      - "task validate:layering"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ARCH003_BusinessImportsCobra"

  CKSPEC-ARCH-004:
    title: "Business logic isolation"
    status: met
    enforcement_level: linter
    evidence: >
      go-arch-lint enforces business packages cannot import each other.
      Each business package mayDependOn infrastructure only.
    checks:
      - "task validate:layering"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ARCH004_BusinessImportsBusiness"

  CKSPEC-ARCH-005:
    title: "Infrastructure independence"
    status: met
    enforcement_level: linter
    evidence: >
      go-arch-lint enforces infrastructure mayDependOn nothing.
      Cannot import business or command layers.
    checks:
      - "task validate:layering"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ARCH005_InfraImportsBusiness"

  CKSPEC-ARCH-006:
    title: "Entry point minimality"
    status: met
    enforcement_level: script
    evidence: >
      main.go is a minimal wiring-only entry point (run() + error handling),
      capped at 60 lines by a conform check so the size claim cannot silently
      rot. validate-package-organization.sh verifies only main.go and
      main_test.go exist at root. validate-command-patterns.sh enforces the
      command-layer limits (run* functions ≤30-line target / 35 hard,
      command files ≤80 advisory).
    checks:
      - "task validate:package-organization"
      - "task validate:commands"
      - "test $(wc -l < main.go) -le 60"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ARCH006_OversizedCommand"
      - "test/conformance/violation_test.go::TestViolation_ARCH006_MarkerWithoutJustification"

  CKSPEC-ARCH-007:
    title: "Package location enforcement"
    status: met
    enforcement_level: script
    evidence: >
      validate-package-organization.sh checks all Go files are in
      designated directories (cmd/, internal/, pkg/, .ckeletin/).
      Only main.go/main_test.go at root.
    checks:
      - "task validate:package-organization"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ARCH007_GoFileInRoot"

  # ═══════════════════════════════════════════════════════════════
  # Enforcement (CKSPEC-ENF-001 through CKSPEC-ENF-007)
  # ═══════════════════════════════════════════════════════════════

  CKSPEC-ENF-001:
    title: "Automated enforcement required"
    status: met
    enforcement_level: honor-system
    evidence: >
      ADR-014 enforcement audit: 12/14 ADRs fully automated,
      1 partial (ADR-008 GoReleaser), 1 honor system (ADR-007 Bubble Tea).
      23 automated checks run via task check. Enforcement coverage is
      verified by human review of the audit table, not a targeted check.
    checks: []
    violation_tests: []
    violation_evidence: >
      Meta-requirement: the project must prefer automated enforcement.
      Its satisfaction is the aggregate of the other requirements'
      enforcement levels (tracked in the ADR-014 audit table and surfaced
      by the conform report's automated-vs-analysis split), assessed at
      review rather than by one check.

  CKSPEC-ENF-002:
    title: "Enforcement ladder"
    status: met
    enforcement_level: script
    evidence: >
      All ladder levels used. Linter: go-arch-lint + golangci-lint.
      SAST: semgrep rules (.semgrep.yml). Scripts: the validate-*.sh and
      check-*.sh suites in .ckeletin/scripts/ (counts are deliberately not
      hand-written here — they rot). CI: GitHub Actions. Honor system:
      ADR-007 (documented as last resort). The ladder's existence is
      verified by review, not a targeted check.
    checks:
      - "test -f .golangci.yml"
      - "test -f .semgrep.yml"
    violation_tests: []
    violation_evidence: >
      Removing the linter (.golangci.yml) or SAST (.semgrep.yml) config
      fails the test checks.

  CKSPEC-ENF-003:
    title: "Document enforcement gaps"
    status: met
    enforcement_level: script
    evidence: >
      ADR-014 enforcement audit table documents gaps explicitly.
      ADR-007: honor system. ADR-008: partial. Gap documentation
      is verified by human review of the audit table.
    checks:
      - "grep -qiE 'gap|honor.system|partial' .ckeletin/docs/adr/014-adr-enforcement-policy.md"
    violation_tests: []
    violation_evidence: >
      If ADR-014 stops documenting gaps, the grep check fails.

  CKSPEC-ENF-004:
    title: "Enforcement audit table"
    status: met
    enforcement_level: script
    evidence: >
      ADR-014 contains living enforcement audit table tracking
      all 14 ADRs with enforcement mechanism, status, and gaps.
      Table existence verified by review.
    checks:
      - "grep -qiE 'audit table|enforcement.*audit' .ckeletin/docs/adr/014-adr-enforcement-policy.md"
    violation_tests: []
    violation_evidence: >
      If the ADR-014 audit table is removed, the grep check fails.

  CKSPEC-ENF-005:
    title: "Conformance mapping completeness"
    status: met
    enforcement_level: script
    evidence: >
      task conform validates all 42 requirement IDs are present in
      conformance-mapping.yaml before running checks. Missing IDs
      cause the generator to fail with a non-zero exit code. The count is
      machine-verified by the ENF-008 drift guard, not hand-maintained.
    checks:
      - "test -f conformance-mapping.yaml"
      - "test -f .ckeletin/scripts/conform.sh"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ENF005_IncompleteMapping"

  CKSPEC-ENF-006:
    title: "Violation tests for enforcement claims"
    status: met
    enforcement_level: script
    evidence: >
      test/conformance/violation_test.go proves enforcement with one
      violation test per claim across the architecture (ARCH-001..007),
      output (OUT-001, OUT-005), testing (TEST-003), agent (AGENT-001,
      AGENT-002, AGENT-006), changelog (CL-001) and conformance-tooling
      (ENF-005, ENF-006, ENF-007, ENF-010 plus mapping-YAML/yq/report-sync
      integrity) claims. Requirements with honor-system enforcement are
      exempt; claims above honor-system without a violation test carry a
      written violation_evidence analysis instead (spec v0.4.0+), which
      TestViolation_ENF006_MissingViolationTestFlagged verifies for every
      enforcement level. Run with: go test -tags conformance
      ./test/conformance/...
    checks:
      - "go test -tags conformance ./test/conformance/..."
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ENF006_MissingViolationTestFlagged"

  CKSPEC-ENF-007:
    title: "Automatic feedback signals"
    status: met
    enforcement_level: script
    evidence: >
      task conform automatically reports feedback signals when a
      requirement's enforcement_level is above honor-system without a
      violation test or violation evidence. Signals are structural, not
      volitional.
    checks:
      - "grep -q 'Feedback signals' .ckeletin/scripts/conform.sh"
    violation_tests: []
    violation_evidence: >
      The violation test verifies the conform script contains
      feedback signal logic (string presence), not that it
      produces correct output — running conform.sh from within
      the conformance test suite causes infinite recursion.
      Behavioral proof: task conform output shows feedback signals
      when enforcement claims lack violation tests.
      File: .ckeletin/scripts/conform.sh (FEEDBACK_FILE logic).
      File: test/conformance/violation_test.go (TestViolation_ENF007).

  CKSPEC-ENF-008:
    title: "Anchored conformance evidence"
    status: met
    enforcement_level: script
    evidence: >
      conform.sh fails if any requirement claimed met lacks both an
      automated check and a violation_evidence anchor — no unanchored
      met-claims. Met requirements are tallied as machine-anchored vs
      analysis-with-evidence and the split is printed. The same gate
      also catches prose count drift ("all N requirement").
    checks:
      - "grep -q 'machine-anchored' .ckeletin/scripts/conform.sh"
      - "grep -q 'met but unanchored' .ckeletin/scripts/conform.sh"
    violation_tests: []
    violation_evidence: >
      The anchoring gate is conform.sh itself; a violation test that
      ran conform.sh from inside the conformance suite would recurse
      (same constraint as ENF-007). Behavioral proof: stripping a met
      requirement's checks and violation_evidence makes task conform
      fail with "met but unanchored".
      File: .ckeletin/scripts/conform.sh (ENF-008 anchoring gate + the
      automated-vs-analysis tally).

  CKSPEC-ENF-009:
    title: "Conformance gate on release"
    status: met
    enforcement_level: ci
    evidence: >
      .github/workflows/ci.yml defines a CKSPEC Conformance job that
      runs task conform; the release job declares
      needs: [test-matrix, build, conformance], so no release can
      publish while conformance fails. The gate declares its SUBJECT
      (CKSPEC-ENF-009 v0.9.0): conform.sh runs the full check in the
      ckeletin-go reference repo, but in a derived project (go.mod module
      is not the reference) it announces "subject: derived project ... no
      implementation-conformance to verify ... no-op by design" and exits 0
      — so an inherited gate neither blocks the derived project's release
      nor silently passes as proven conformance. A scheduled run opens a
      deduplicated drift issue. Verified end-to-end via workflow_dispatch
      with the conformance job green, and by the subject-gate no-op subtest
      in test/integration/scaffold_init_test.go.
    checks:
      - "grep -q 'CKSPEC Conformance' .github/workflows/ci.yml"
      - "grep -qE 'needs:.*conformance' .github/workflows/ci.yml"
      - "grep -q 'subject: derived project' .ckeletin/scripts/conform.sh"
    violation_tests: []
    violation_evidence: >
      Enforcement is CI-structural — a job dependency in the release
      pipeline that a unit test cannot exercise. Proof is the workflow
      itself: the release job's needs: list includes conformance, so
      the release will not run while the conformance job fails.
      File: .github/workflows/ci.yml (conformance job + release needs).

  CKSPEC-ENF-010:
    title: "Published machine-readable conformance report"
    status: met
    enforcement_level: script
    evidence: >
      ckeletin-go publishes conformance-report.json — a deterministic,
      machine-readable projection of this mapping generated by
      gen-conformance-report.sh (yq extracts data, python canonicalizes
      formatting; no timestamp). task conform regenerates it in-memory and
      fails on drift (the report-sync guard), and the spec repo's
      aggregate_conformance.py consumes the published report instead of
      hand-authoring conformance/ckeletin-go.yaml.
    checks:
      - "test -f conformance-report.json"
      - "test -f .ckeletin/scripts/gen-conformance-report.sh"
      - "grep -q 'out of sync' .ckeletin/scripts/conform.sh"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_ConformReport_OutOfSyncRejected"

  CKSPEC-ENF-011:
    title: "Tooling robustness to nested checkouts"
    status: met
    enforcement_level: test
    evidence: >
      ckeletin-go's tree-walking scanners bound their traversal to the
      project's own sources and do not descend into nested repository or
      worktree checkouts. The shared exclusion lives in
      .ckeletin/scripts/lib/check-output.sh (skips .claude/worktrees/ and any
      directory carrying its own go.mod — a nested module is never part of
      this module's walk); the formatter (format-go.sh) shares that exclusion,
      and the architecture linter (.go-arch-lint.yml) excludes .claude/ as well.
      Surfaced by #123 (reported by daana-cli): a scanner descended into Claude
      Code's worktree directory and broke on stale nested module checkouts.
      Verified by test/integration/scanner_exclusion_test.go
      (TestScannersExcludeClaudeWorktrees): format check, format fix, layering
      validation, and — in CI, where semgrep is present — the SAST scan each
      ignore a stale worktree.
    checks:
      - "grep -q '.claude/worktrees' .ckeletin/scripts/lib/check-output.sh"
      - |-
        grep -q '\.claude' .go-arch-lint.yml
      - "test -f test/integration/scanner_exclusion_test.go"
    violation_tests: []
    violation_evidence: >
      Removing the .claude/worktrees exclusion from check-output.sh (or the
      arch-lint config) lets the scanners descend into nested worktree
      checkouts again — the corresponding grep check fails, and
      TestScannersExcludeClaudeWorktrees fails (a stale worktree's unbuildable
      code is walked and flagged, or breaks the scan).

  # ═══════════════════════════════════════════════════════════════
  # Testing (CKSPEC-TEST-001 through CKSPEC-TEST-004)
  # ═══════════════════════════════════════════════════════════════

  CKSPEC-TEST-001:
    title: "Test-driven development"
    status: met
    enforcement_level: honor-system
    evidence: >
      TDD mandatory per AGENTS.md and CLAUDE.md. Process discipline
      enforced through agent instructions, not tooling.
    checks: []
    violation_tests: []
    violation_evidence: >
      TDD is a temporal property — 'the failing test was written before
      the implementation' is not observable in the committed artifact, so
      no static check can decide it. Mandated by AGENTS.md/CLAUDE.md; a
      violation (implementation with no prior failing test) is caught at
      code review, not by tooling.

  CKSPEC-TEST-002:
    title: "Minimum coverage threshold"
    status: met
    enforcement_level: script
    evidence: >
      check-coverage-project.sh enforces 85% minimum. Pre-push hook
      runs coverage check. Current coverage: 90.3%.
    checks:
      - "test -f .ckeletin/scripts/check-coverage-project.sh"
    violation_tests: []
    violation_evidence: >
      Destructive-to-test: reducing coverage below 85% to trigger the
      check would break the test suite. Enforcement mechanism is the
      script and its pre-push hook integration.
      File: .ckeletin/scripts/check-coverage-project.sh (MINIMUM_COVERAGE=85).
      File: .ckeletin/configs/lefthook.base.yml (pre-push runs coverage).

  CKSPEC-TEST-003:
    title: "Dependency injection over mocking"
    status: met
    enforcement_level: sast
    evidence: >
      Semgrep rule ckeletin-no-mock-frameworks detects gomock/mockery/
      testify-mock imports in Go files. Violation test creates a file
      with a gomock import and verifies semgrep catches it.
    checks:
      - "test -f .semgrep.yml"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_TEST003_MockFrameworkImport"

  CKSPEC-TEST-004:
    title: "Atomic test commits"
    status: met
    enforcement_level: honor-system
    evidence: >
      AGENTS.md mandates atomic commits. Process discipline enforced
      through agent instructions and code review.
    checks: []
    violation_tests: []
    violation_evidence: >
      Whether a commit atomically pairs a test with its implementation is
      a review judgment over commit contents, not a mechanically
      decidable property. Mandated by AGENTS.md and enforced at review.

  # ═══════════════════════════════════════════════════════════════
  # Output (CKSPEC-OUT-001 through CKSPEC-OUT-005)
  # ═══════════════════════════════════════════════════════════════

  CKSPEC-OUT-001:
    title: "Three-stream output separation"
    status: met
    enforcement_level: script
    evidence: >
      ADR-013 defines 3-stream model. Logger writes console to stderr,
      file to JSON. internal/ui renders to stdout. validate-output-patterns.sh
      enforces separation.
    checks:
      - "task validate:output"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_OUT001_BusinessUsesOsStdout"

  CKSPEC-OUT-002:
    title: "Machine-readable output mode"
    status: met
    enforcement_level: script
    evidence: >
      The global --output text|json flag (cmd/root.go PersistentPreRunE)
      activates JSON mode for every production command, each emitting the
      standard envelope to stdout: ping (ui.RenderSuccess), docs config
      (docs.GenerateJSON), config validate (ui.RenderValidationJSON),
      catalog, and --version (renderVersion). Stderr logging is silenced in
      JSON mode. Behavioral proof: the TestOutputJSON_* suite plus
      command-specific JSON tests execute each command with --output json
      and assert a single valid envelope. Documented exemptions:
      `completion` emits shell scripts whose only consumer is already a
      machine (the shell sources them; a JSON wrapper would break every
      `source <(app completion bash)` usage), and dev-only commands
      (check, dev *) are compiled out of production builds (//go:build dev)
      so they are not part of the released command surface.
    checks:
      - "grep -rq 'IsJSONMode' .ckeletin/pkg/output"
      - "grep -q 'IsJSONMode' internal/ui/renderer.go"
      - "grep -q 'IsJSONMode' cmd/docs.go"
      - "grep -q 'IsJSONMode' cmd/config.go"
      - "grep -q 'IsJSONMode' cmd/catalog.go"
      - "grep -q 'IsJSONMode' cmd/root.go"
    violation_tests: []
    violation_evidence: >
      Removing the JSON plumbing from the output package, the renderer, or
      any per-command wiring (docs config, config validate, catalog,
      --version) fails the per-file greps above. Behavioral coverage:
      cmd/output_json_test.go, cmd/docs_json_test.go,
      cmd/config_validate_json_test.go, cmd/catalog_test.go and
      cmd/version_output_test.go fail if any of those commands stops
      emitting a valid envelope under --output json.

  CKSPEC-OUT-003:
    title: "Standardized output envelope"
    status: met
    enforcement_level: script
    evidence: >
      JSONEnvelope struct in .ckeletin/pkg/output/json.go emits the TOTAL
      envelope (CKSPEC-OUT-003 v0.9.0): all four keys — status, command,
      data, error — carry no `omitempty`, so every key is present in every
      envelope and an absent value (data on error, error on success) is
      emitted as JSON null rather than omitted. JSONResponder interface for
      custom payloads. Verified by unit tests. (The error object's optional
      code field is the deferred structured-error shape called out in the
      OUT-003 spec notes — out of scope for the total top-level envelope.)
    checks:
      - "grep -rq 'type JSONEnvelope' .ckeletin/pkg/output"
      - |-
        ! grep -qE 'json:"(status|command|data|error)[^"]*,omitempty"' .ckeletin/pkg/output/json.go
    violation_tests: []
    violation_evidence: >
      Removing the JSONEnvelope struct fails the first grep check; adding
      `omitempty` to any of the four envelope keys (which would drop a key
      when absent instead of emitting null) fails the second.

  CKSPEC-OUT-004:
    title: "Shadow logging"
    status: met
    enforcement_level: script
    evidence: >
      RenderSuccess and RenderError in internal/ui/renderer.go log.Debug()
      raw data to the audit log file while rendering formatted text to
      stdout; debug level reaches the file logger without polluting the
      console. Commands that stream generated artifacts shadow-log the
      operation's metadata rather than the full artifact: docs config
      records format, output file and content size
      (internal/docs/json.go, cmd/docs.go), and completion's shell
      scripts are cobra-generated artifacts. This metadata-not-artifact
      narrowing for generated artifacts is a documented project
      interpretation of OUT-004 (verbatim multi-KB artifacts would bloat
      the audit stream without adding evidence) — flagged upstream as
      spec feedback. Verified by unit tests.
    checks:
      - |-
        grep -qE 'log\.Debug' internal/ui/renderer.go
      - |-
        grep -qE 'log\.Debug' internal/docs/json.go
    violation_tests: []
    violation_evidence: >
      Removing the shadow log.Debug from the renderer or from the docs
      JSON path fails the grep checks.

  CKSPEC-OUT-005:
    title: "Output isolation from business logic"
    status: met
    enforcement_level: script
    evidence: >
      validate-output-patterns.sh detects fmt.Print* and os.Stdout in
      internal/* (excluding tests). Business logic must use internal/ui
      for output. Documented scan exemptions: ui/ and logger/ ARE the
      rendering/audit layers, testutil/ is test plumbing, and progress/
      touches os.Stdout only for terminal detection
      (IsInteractive(os.Stdout) in internal/progress/terminal.go) plus
      dev-build-only demo rendering — none of these emit business output
      directly.
    checks:
      - "task validate:output"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_OUT005_BusinessUsesFmtPrint"

  CKSPEC-OUT-006:
    title: "Build identity in version output"
    status: met
    enforcement_level: test
    evidence: >
      cmd/root.go composes the --version string as
      "<version>, commit <commit>, built at <date>, tree <state>" — all four
      OUT-006 fields including dirty-tree state. Uninjected builds degrade
      to explicit "unknown" (Version/Commit/Date default to versionUnknown,
      never empty). treeState() resolves clean/dirty/unknown from the Dirty
      ldflag (GoReleaser {{ .IsGitDirty }}), the git-describe "-dirty"
      suffix (Taskfile builds), or degrades to "unknown". --version honors
      --output json via renderVersion (versionData envelope with
      version/commit/date/tree).
    checks:
      - "grep -qE 'commit %s, built at %s, tree %s' cmd/root.go"
      - "grep -q 'Version = versionUnknown' cmd/root.go"
      - "go test -run 'TestVersionString_SurfacesAllFourFields|TestTreeState|TestBuildIdentityDefaults_UninjectedBuild|TestVersionFlag_JSONOutput' ./cmd/"
    violation_tests: []
    violation_evidence: >
      Dropping any of the four fields from versionString(), the
      unknown-degradation defaults, or the JSON envelope path fails the
      greps and the behavioral tests the third check runs
      (TestVersionString_SurfacesAllFourFields, TestTreeState,
      TestBuildIdentityDefaults_UninjectedBuild, TestVersionFlag_JSONOutput
      in cmd/version_output_test.go), so the regression cannot land green.

  # ═══════════════════════════════════════════════════════════════
  # Agent Readiness (CKSPEC-AGENT-001 through CKSPEC-AGENT-006)
  # ═══════════════════════════════════════════════════════════════

  CKSPEC-AGENT-001:
    title: "Universal agent guide"
    status: met
    enforcement_level: script
    evidence: >
      AGENTS.md exists (358+ lines). Covers project purpose, directory
      structure, all task commands, coding conventions, ADR lookup,
      testing strategy, troubleshooting.
    checks:
      - "test -f AGENTS.md"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_AGENT001_MissingAgentsMd"

  CKSPEC-AGENT-002:
    title: "No provider-specific content in universal guide"
    status: met
    enforcement_level: script
    evidence: >
      AGENTS.md contains no Claude/Gemini/Copilot-specific instructions;
      provider content lives in CLAUDE.md, .cursorrules and
      copilot-instructions.md. A grep check rejects provider names
      (Claude, Gemini, Copilot, ChatGPT, Anthropic, OpenAI, Cursor) in
      AGENTS.md except on lines that reference the provider-specific
      files themselves (file-tree entries and cross-references), so a
      provider instruction such as 'Claude should ...' fails conformance.
    checks:
      - |-
        ! grep -nE 'Claude|Gemini|Copilot|ChatGPT|Anthropic|OpenAI|Cursor' AGENTS.md | grep -viE 'CLAUDE\.md|GEMINI\.md|\.cursorrules|copilot-instructions\.md' | grep -q .
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_AGENT002_ProviderInstructionCaught"
    violation_evidence: >
      Residual gap (reviewed, accepted): the grep filters whole lines
      that mention a provider FILE, so a provider instruction sharing a
      line with such a cross-reference (e.g. 'Claude must X, see
      CLAUDE.md') escapes it — those lines remain a review concern.
      TestViolation_AGENT002_ProviderInstructionCaught proves the check
      passes on the current AGENTS.md and catches a plain
      provider-instruction line, running the exact command from this
      mapping against a doctored copy.

  CKSPEC-AGENT-003:
    title: "Provider-specific guides follow provider guidance"
    status: met
    enforcement_level: script
    evidence: >
      CLAUDE.md references AGENTS.md first. No project knowledge
      duplicated. .cursorrules and copilot-instructions.md also
      reference AGENTS.md.
    checks:
      - |-
        grep -qE 'AGENTS\.md' CLAUDE.md
    violation_tests: []
    violation_evidence: >
      If a provider guide stops referencing AGENTS.md, the grep check
      fails.

  CKSPEC-AGENT-004:
    title: "Agent guide completeness"
    status: met
    enforcement_level: script
    evidence: >
      AGENTS.md is self-sufficient: project purpose, directory tree,
      all task commands, coding conventions, ADR table, git workflow,
      troubleshooting with cascading fix order.
    checks:
      - "grep -qiE 'Commands' AGENTS.md"
      - "grep -qiE 'Troubleshoot' AGENTS.md"
    violation_tests: []
    violation_evidence: >
      Removing the required sections from AGENTS.md fails the section
      grep checks.

  CKSPEC-AGENT-005:
    title: "CLI as the agent interface"
    status: met
    enforcement_level: honor-system
    evidence: >
      CLI is primary interface. All operations via task commands.
      --output json provides machine-readable responses. No protocol
      layer required.
    checks: []
    violation_tests: []
    violation_evidence: >
      'The CLI is the agent interface' is an architectural property (no
      separate protocol/daemon layer), verified by inspecting the design
      rather than a single artifact. Adding a non-CLI protocol layer is
      caught at architecture review.

  CKSPEC-AGENT-006:
    title: "Machine-readable command catalog"
    status: met
    enforcement_level: script
    evidence: >
      ckeletin-go exposes a `catalog` command (cmd/catalog.go) that emits its
      command surface as the data of an OUT-002 success envelope
      (`catalog --output json`), derived from the live cobra command tree
      (RootCmd) - the same tree the parser uses - so the catalog cannot drift
      from the actual surface (anti-drift is structural, not tested-in). The
      shared schema types live in .ckeletin/pkg/catalog (Catalog/Command/Flag),
      matching the cross-implementation contract agreed with ckeletin-rust: the
      required core (long/required/takes_value) is always present and optional
      fields (short/description/default) are omitted when absent. Derivation and
      schema are verified by cmd/catalog_test.go and .ckeletin/pkg/catalog.
    checks:
      - "test -f cmd/catalog.go"
      - "test -f .ckeletin/pkg/catalog/catalog.go"
      - "grep -q 'MustAddToRoot(catalogCmd)' cmd/catalog.go"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_AGENT006_CatalogCommandRemoved"

  CKSPEC-AGENT-007:
    title: "Scaffold artifact ownership boundary"
    status: met
    enforcement_level: script
    evidence: >
      A project scaffolded from ckeletin-go never inherits ckeletin-go's own
      conformance truth. `task init` runs removeFrameworkOnlyArtifacts
      (.ckeletin/scripts/scaffold/helpers.go), which deletes the
      generated-evidence and upstream-only conformance artifacts that live
      outside the framework area — conformance-mapping.yaml,
      conformance-report.json, and test/conformance/ — so a derived project
      carries neither go's generated evidence nor its reference-only
      conformance prose (delete over stamp: a stale inherited report is worse
      than its absence). The framework area (.ckeletin/) is kept wholesale and
      replaced on update, with its upstream-only gate guarded INERT rather than
      stripped file-by-file: conform.sh is subject-gated (CKSPEC-ENF-009) — in
      a derived project (go.mod module is not the ckeletin-go reference) it
      declares its subject and exits 0 instead of hard-failing, so an inherited
      gate never blocks the derived project's release. The strip and the
      subject-gate no-op are verified end-to-end by
      test/integration/scaffold_init_test.go (TestScaffoldInit).
    checks:
      - "grep -q 'removeFrameworkOnlyArtifacts' .ckeletin/scripts/scaffold/main.go"
      - "grep -q 'conformance-mapping.yaml' .ckeletin/scripts/scaffold/helpers.go"
      - "grep -q 'subject: derived project' .ckeletin/scripts/conform.sh"
    violation_tests: []
    violation_evidence: >
      Each check guards a distinct part of the mechanism. Removing the
      removeFrameworkOnlyArtifacts call from scaffold/main.go drops the strip
      entirely — check 1 (the main.go call-site grep) fails. Removing
      conformance-mapping.yaml from the artifact list in helpers.go makes init
      leak go's evidence into a derived project — check 2 (the helpers.go
      artifact grep) fails. Removing the subject-gate from conform.sh makes the
      inherited gate hard-fail in a derived project and block its release —
      check 3 fails, and TestScaffoldInit's "conformance gate subject-gated"
      subtest fails.

  # ═══════════════════════════════════════════════════════════════
  # Changelog (CKSPEC-CL-001 through CKSPEC-CL-007)
  # ═══════════════════════════════════════════════════════════════

  CKSPEC-CL-001:
    title: "CHANGELOG.md in repository root"
    status: met
    enforcement_level: script
    evidence: "CHANGELOG.md exists in repository root."
    checks:
      - "test -f CHANGELOG.md"
    violation_tests:
      - "test/conformance/violation_test.go::TestViolation_CL001_MissingChangelogMd"

  CKSPEC-CL-002:
    title: "Keep a Changelog format"
    status: met
    enforcement_level: script
    evidence: >
      CHANGELOG.md follows Keep a Changelog: the format is referenced in
      the header, and every change-group heading is one of the six
      standard categories (Added, Changed, Deprecated, Removed, Fixed,
      Security) — both grep-enforced. Reverse-chronological version order
      is verified at review/release, not by a check.
    checks:
      - "grep -qiE 'keepachangelog' CHANGELOG.md"
      - |-
        ! grep -E '^### ' CHANGELOG.md | grep -vE '^### (Added|Changed|Deprecated|Removed|Fixed|Security)$' | grep -q .
    violation_tests: []
    violation_evidence: >
      Dropping the Keep a Changelog reference fails the first check; a
      non-standard change category heading (e.g. '### Misc') fails the
      second.

  CKSPEC-CL-003:
    title: "ISO 8601 dates"
    status: met
    enforcement_level: script
    evidence: "All dates use YYYY-MM-DD format."
    checks:
      - |-
        grep -qE '^## \[.+\] - [0-9]{4}-[0-9]{2}-[0-9]{2}' CHANGELOG.md
    violation_tests: []
    violation_evidence: >
      A non-ISO-8601 release date fails the date-format grep check.

  CKSPEC-CL-004:
    title: "Semantic Versioning"
    status: met
    enforcement_level: script
    evidence: >
      CHANGELOG.md states adherence to SemVer. Version numbers follow
      MAJOR.MINOR.PATCH throughout.
    checks:
      - |-
        grep -qE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md
    violation_tests: []
    violation_evidence: >
      A non-SemVer version header fails the grep check.

  CKSPEC-CL-005:
    title: "Unreleased section"
    status: met
    enforcement_level: script
    evidence: "[Unreleased] section present at top of CHANGELOG.md."
    checks:
      - |-
        grep -qE '^## \[Unreleased\]' CHANGELOG.md
    violation_tests: []
    violation_evidence: >
      Removing the Unreleased section fails the grep check.

  CKSPEC-CL-006:
    title: "Human-curated, not auto-generated"
    status: met
    enforcement_level: honor-system
    evidence: >
      Changelog entries are human-written at user-relevant granularity.
      Not git log dumps.
    checks: []
    violation_tests: []
    violation_evidence: >
      Distinguishing human-curated, user-relevant changelog prose from an
      auto-generated git-log dump is an editorial judgment no grep can
      make reliably. Enforced at review; a git-log-style dump is caught
      there.

  CKSPEC-CL-007:
    title: "Version comparison links"
    status: met
    enforcement_level: script
    evidence: >
      Reference-style comparison links at bottom of CHANGELOG.md for
      all versions.
    checks:
      - |-
        grep -qE '^\[.+\]: https?://.+/compare/' CHANGELOG.md
    violation_tests: []
    violation_evidence: >
      Removing the reference-style compare links fails the grep check.
