name: Lint CI Workflows

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/**
  pull_request:
    paths:
      - .github/workflows/**

# Default to no permissions; each job grants only what it needs
permissions: {}

jobs:
  lint:
    name: Lint workflows yaml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read  # Only need read access to checkout workflow files

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Download actionlint
        id: get_actionlint
        env:
          ACTIONLINT_VERSION: '1.7.12'
          # sha256 of actionlint_1.7.12_linux_amd64.tar.gz from the release's checksums.txt
          ACTIONLINT_SHA256: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
        run: |
          curl -sSfL -o actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          rm actionlint.tar.gz
          echo "executable=$(pwd)/actionlint" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash
